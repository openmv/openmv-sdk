name: 'Build SDK or TOOLS'

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        type: choice
        options:
          - sdk
          - tools
        default: sdk
      version:
        description: 'Version (e.g. 1.5.0)'
        type: string
        required: true

permissions:
  contents: read

jobs:
  build-linux:
    name: 'Build ${{ inputs.target }} (Linux x86_64)'
    runs-on: ubuntu-24.04

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5

      - name: 'Cache downloads'
        uses: actions/cache@v5
        with:
          path: sdk/tmp
          key: sdk-dl-linux-x86_64-${{ hashFiles('tools/downloads.cfg') }}

      - name: 'Install build dependencies'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config \
            libxkbcommon-x11-0 libxcb-xinerama0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 libxcb-render-util0

      - name: 'Build and package'
        env:
          SDK_VERSION: ${{ inputs.version }}
          BUILD_TARGET: ${{ inputs.target }}
        run: |
          chmod +x tools/build.sh tools/package.sh
          ./tools/build.sh
          ./tools/package.sh

      - name: 'Upload artifact'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.target }}-linux-x86_64
          path: |
            sdk/openmv-sdk-*.tar.xz
            sdk/openmv-sdk-*.tar.xz.sha256
            sdk/tools-*.tar.xz
            sdk/tools-*.tar.xz.sha256
          retention-days: 7
          if-no-files-found: error

  build-darwin:
    name: 'Build ${{ inputs.target }} (macOS arm64)'
    runs-on: macos-latest

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5

      - name: 'Cache downloads'
        uses: actions/cache@v5
        with:
          path: sdk/tmp
          key: sdk-dl-darwin-arm64-${{ hashFiles('tools/downloads.cfg') }}

      - name: 'Install build dependencies'
        run: brew install automake autoconf libtool pkg-config xz

      - name: 'Import Apple certificate'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: 'Build'
        env:
          SDK_VERSION: ${{ inputs.version }}
          BUILD_TARGET: ${{ inputs.target }}
        run: |
          chmod +x tools/build.sh tools/package.sh
          ./tools/build.sh

      - name: 'Sign Mach-O binaries'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ "${{ inputs.target }}" = "sdk" ]; then
            SDK_STAGE="sdk/openmv-sdk-${{ inputs.version }}-darwin-arm64"
          else
            SDK_STAGE="sdk/tools-darwin-arm64"
          fi
          echo "Scanning ${SDK_STAGE} for Mach-O binaries..."
          MACHO_LIST=$(mktemp)
          find "${SDK_STAGE}" -type f \
            -exec file {} \; 2>/dev/null | grep "Mach-O" | grep -v "(for architecture" \
            | cut -d: -f1 | sort -u > "${MACHO_LIST}" || true
          ENTITLEMENTS="tools/entitlements.plist"
          COUNT=0
          SKIP=0
          while IFS= read -r f; do
            if codesign --verify --strict "$f" 2>/dev/null; then
              if codesign -d -v "$f" 2>&1 | grep -q "Authority="; then
                SKIP=$((SKIP + 1))
                continue
              fi
            fi
            echo "  Signing: $f"
            codesign --force --options runtime --timestamp \
              --entitlements "${ENTITLEMENTS}" \
              --sign "${APPLE_SIGNING_IDENTITY}" "$f"
            COUNT=$((COUNT + 1))
          done < "${MACHO_LIST}"
          rm -f "${MACHO_LIST}"
          echo "Signed ${COUNT} binaries, skipped ${SKIP} already valid."

      - name: 'Package'
        env:
          SDK_VERSION: ${{ inputs.version }}
          BUILD_TARGET: ${{ inputs.target }}
        run: ./tools/package.sh

      - name: 'Upload artifact'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.target }}-darwin-arm64
          path: |
            sdk/openmv-sdk-*.tar.xz
            sdk/openmv-sdk-*.tar.xz.sha256
            sdk/tools-*.tar.xz
            sdk/tools-*.tar.xz.sha256
          retention-days: 7
          if-no-files-found: error

  build-windows:
    name: 'Build ${{ inputs.target }} (Windows x86_64)'
    runs-on: windows-latest

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5

      - name: 'Cache downloads'
        uses: actions/cache@v5
        with:
          path: sdk/tmp
          key: sdk-dl-windows-x86_64-${{ hashFiles('tools/downloads.cfg') }}

      - name: 'Setup MSYS2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-xz
            autoconf automake libtool pkg-config make git
            unzip

      - name: 'Build and package'
        shell: msys2 {0}
        env:
          SDK_VERSION: ${{ inputs.version }}
          BUILD_TARGET: ${{ inputs.target }}
        run: |
          chmod +x tools/build.sh tools/package.sh
          ./tools/build.sh
          ./tools/package.sh

      - name: 'Upload artifact'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.target }}-windows-x86_64
          path: |
            sdk/openmv-sdk-*.tar.xz
            sdk/openmv-sdk-*.tar.xz.sha256
            sdk/tools-*.tar.xz
            sdk/tools-*.tar.xz.sha256
          retention-days: 7
          if-no-files-found: error

  upload:
    name: 'Upload to R2'
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-24.04

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5

      - name: 'Download artifacts'
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: '${{ inputs.target }}-*'
          merge-multiple: true

      - name: 'Upload to R2'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          TARGET: ${{ inputs.target }}
          SDK_VERSION: ${{ inputs.version }}
        run: |
          if [ "${TARGET}" = "sdk" ]; then
            for f in artifacts/openmv-sdk-*.tar.xz artifacts/openmv-sdk-*.tar.xz.sha256; do
              [ -e "$f" ] || continue
              echo "Uploading $(basename "$f") -> sdk/..."
              aws s3 cp "$f" "s3://download/sdk/$(basename "$f")"
            done
          else
            for f in artifacts/tools-*.tar.xz; do
              [ -e "$f" ] || continue
              echo "Uploading $(basename "$f") -> studio/..."
              aws s3 cp "$f" "s3://download/studio/$(basename "$f")"
            done
            chmod +x tools/manifest.sh
            ./tools/manifest.sh artifacts artifacts/tools.json
            echo "Uploading tools.json -> studio/..."
            aws s3 cp artifacts/tools.json s3://download/studio/tools.json \
              --content-type application/json
          fi
          echo "Done."

  trigger-studio:
    name: 'Trigger openmv-studio resources update'
    needs: upload
    if: inputs.target == 'tools'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 'Generate token'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: openmv-studio

      - name: 'Trigger resources workflow'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh workflow run resources.yml --repo ${{ github.repository_owner }}/openmv-studio
